<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Self-Care OS</title>
<meta name="color-scheme" content="light dark"/>
<style>
/* ═══════════════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════════════ */
/* ── HIG: Opt into light+dark color-scheme ── */
:root{
  color-scheme: light dark;

  /* Brand (unchanged in both modes) */
  --navy:#0B1F3A;
  --navy-mid:#163560;
  --navy-light:#1d4a8a;
  --gold:#C7A46A;
  --gold-light:#e8c488;
  --gold-dim:rgba(199,164,106,.15);

  /* Semantic surface colours — LIGHT defaults */
  --bg:#EEF1F8;
  --surface:#F5F7FC;
  --card:#FFFFFF;
  --card-elevated:#FFFFFF;
  --text-primary:#0B1F3A;
  --text-secondary:#334155;
  --muted:#64748B;
  --muted-light:#94a3b8;
  --line:#E2E8F0;
  --line-dark:#CBD5E1;
  --accent-blue:#EEF3FF;

  /* Status colours */
  --danger:#DC2626;
  --danger-bg:#FEE2E2;
  --warn:#F59E0B;
  --warn-bg:#FEF3C7;
  --green:#16A34A;
  --green-bg:#DCFCE7;
  --teal:#0F766E;
  --purple:#7C3AED;

  /* Radius */
  --r-xl:26px;
  --r-lg:20px;
  --r-md:16px;
  --r-sm:12px;

  /* Shadows */
  --shadow-sm:0 2px 8px rgba(11,31,58,.07);
  --shadow-md:0 4px 20px rgba(11,31,58,.1);
  --shadow-lg:0 8px 36px rgba(11,31,58,.14);

  /* HIG: SF Pro system font stack */
  --font-body: -apple-system, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
  --font-display: -apple-system, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
  --font-rounded: -apple-system, "SF Pro Rounded", "Helvetica Neue", Arial, sans-serif;

  /* HIG minimum touch target */
  --touch-min: 44px;
}

/* ── HIG: Dark Mode token overrides ── */
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --bg:#0F1923;
    --surface:#1C2733;
    --card:#1E2D3D;
    --card-elevated:#253346;
    --text-primary:#F0F4F8;
    --text-secondary:#CBD5E1;
    --muted:#94A3B8;
    --muted-light:#64748B;
    --line:#2A3A4A;
    --line-dark:#374859;
    --accent-blue:#162032;
    --danger-bg:rgba(220,38,38,.18);
    --warn-bg:rgba(245,158,11,.15);
    --green-bg:rgba(22,163,74,.15);
    --shadow-sm:0 2px 8px rgba(0,0,0,.3);
    --shadow-md:0 4px 20px rgba(0,0,0,.4);
    --shadow-lg:0 8px 36px rgba(0,0,0,.5);
  }
}
/* Manual dark override */
[data-theme="dark"] {
    --bg:#0F1923;
    --surface:#1C2733;
    --card:#1E2D3D;
    --card-elevated:#253346;
    --text-primary:#F0F4F8;
    --text-secondary:#CBD5E1;
    --muted:#94A3B8;
    --muted-light:#64748B;
    --line:#2A3A4A;
    --line-dark:#374859;
    --accent-blue:#162032;
    --danger-bg:rgba(220,38,38,.18);
    --warn-bg:rgba(245,158,11,.15);
    --green-bg:rgba(22,163,74,.15);
    --shadow-sm:0 2px 8px rgba(0,0,0,.3);
    --shadow-md:0 4px 20px rgba(0,0,0,.4);
    --shadow-lg:0 8px 36px rgba(0,0,0,.5);
}

/* ═══════════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════════ */
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;overscroll-behavior:none}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--text-primary);
  font-size:max(14px, 1rem);
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  -webkit-text-size-adjust:100%;
}
button{font:inherit;cursor:pointer;border:none;background:none}
svg{display:block}

/* ═══════════════════════════════════════════════════
   APP SHELL
═══════════════════════════════════════════════════ */
#app{
  max-width:430px;
  margin:0 auto;
  min-height:100dvh;
  background:var(--bg);
  position:relative;
  overflow:hidden;
}

/* ═══════════════════════════════════════════════════
   SCREENS
═══════════════════════════════════════════════════ */
.screen{
  position:absolute;
  inset:0;
  overflow-y:auto;
  overflow-x:hidden;
  padding-top:calc(64px + env(safe-area-inset-top));
  padding-bottom:calc(90px + env(safe-area-inset-bottom));
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.screen::-webkit-scrollbar{display:none}
.screen.entering{animation:slideIn .28s cubic-bezier(.4,0,.2,1) forwards}
.screen.exiting{animation:slideOut .25s cubic-bezier(.4,0,.2,1) forwards}
.screen.entering-back{animation:slideInBack .28s cubic-bezier(.4,0,.2,1) forwards}
.screen.exiting-forward{animation:slideOutForward .25s cubic-bezier(.4,0,.2,1) forwards}

@keyframes slideIn{from{transform:translateX(100%);opacity:.8}to{transform:translateX(0);opacity:1}}
@keyframes slideOut{from{transform:translateX(0);opacity:1}to{transform:translateX(-30%);opacity:.5}}
@keyframes slideInBack{from{transform:translateX(-30%);opacity:.5}to{transform:translateX(0);opacity:1}}
@keyframes slideOutForward{from{transform:translateX(0);opacity:1}to{transform:translateX(100%);opacity:.8}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
@keyframes scaleIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ═══════════════════════════════════════════════════
   TOP BAR
═══════════════════════════════════════════════════ */
.topbar{
  position:fixed;
  top:0;
  left:50%;
  transform:translateX(-50%);
  width:min(430px,100vw);
  z-index:50;
  background:color-mix(in srgb, var(--bg) 95%, transparent);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(226,232,240,.7);
  padding:calc(10px + env(safe-area-inset-top)) 18px 10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  min-height:64px;
}
.topbar-left{display:flex;align-items:center;gap:10px}
.brand-mark{
  width:34px;height:34px;border-radius:10px;min-width:var(--touch-min);min-height:var(--touch-min);display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--navy),var(--navy-light));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 10px rgba(11,31,58,.25);
  flex:none;
}
.topbar-titles .eyebrow{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);font-weight:600}
.topbar-titles .screen-name{font-size:17px;font-weight:700;color:var(--text-primary);font-family:var(--font-display);font-weight:300;letter-spacing:-.01em;line-height:1.1}
.btn-back{
  width:var(--touch-min);height:var(--touch-min);border-radius:999px;
  border:1.5px solid var(--line);background:var(--card);
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow-sm);
  flex:none;
  transition:background .15s;
}
.btn-back:active{background:var(--surface)}
.topbar-right{display:flex;gap:8px;align-items:center}
.pill-btn{
  background:var(--accent-blue);
  border:1px solid var(--line);
  border-radius:999px;
  padding:6px 12px;
  font-size:12px;font-weight:700;color:var(--text-primary);
  display:flex;align-items:center;gap:5px;
  transition:background .15s;
}
.pill-btn:active{background:var(--line)}
.live-dot{
  width:7px;height:7px;border-radius:999px;
  background:var(--green);
  animation:pulse 2s infinite;
  flex:none;
}

/* ═══════════════════════════════════════════════════
   TAB BAR
═══════════════════════════════════════════════════ */
.tabbar{
  position:fixed;
  bottom:0;left:50%;
  transform:translateX(-50%);
  width:min(430px,100vw);
  z-index:50;
  background:color-mix(in srgb, var(--card) 97%, transparent);
  border-top:1px solid rgba(226,232,240,.8);
  padding:8px 6px calc(10px + env(safe-area-inset-bottom));
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:4px;
  backdrop-filter:blur(16px);
}
.tab-btn{
  border-radius:var(--r-md);
  padding:8px 4px 6px;
  min-height:var(--touch-min);
  display:flex;flex-direction:column;align-items:center;gap:3px;
  color:var(--muted-light);font-size:10.5px;font-weight:500;
  transition:color .2s,background .2s;
}
.tab-btn.active{background:var(--accent-blue);color:var(--text-primary)}
.tab-btn svg{width:20px;height:20px;transition:transform .2s}
.tab-btn.active svg{transform:scale(1.05)}

/* ═══════════════════════════════════════════════════
   PLATFORM SWITCHER
═══════════════════════════════════════════════════ */
.platform-bar{
  display:flex;gap:7px;overflow-x:auto;
  padding-bottom:2px;scrollbar-width:none;
}
.platform-bar::-webkit-scrollbar{display:none}
.plat-btn{
  white-space:nowrap;border-radius:14px;padding:9px 15px;
  min-height:var(--touch-min);
  font-size:12.5px;font-weight:700;
  background:var(--surface);color:var(--text-secondary);
  border:1px solid var(--line);
  transition:all .2s;
}
.plat-btn.active{
  background:var(--navy);color:#fff;
  border-color:var(--text-primary);
  box-shadow:0 2px 10px rgba(11,31,58,.22);
}

/* ═══════════════════════════════════════════════════
   LAYOUT HELPERS
═══════════════════════════════════════════════════ */
.pad{padding:14px}
.stack{display:flex;flex-direction:column;gap:12px}
.stack-sm{display:flex;flex-direction:column;gap:8px}
.row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.row-start{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.col{display:flex;flex-direction:column}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.fx-anim > *{animation:fadeUp .3s ease both}
.fx-anim > *:nth-child(1){animation-delay:.04s}
.fx-anim > *:nth-child(2){animation-delay:.09s}
.fx-anim > *:nth-child(3){animation-delay:.14s}
.fx-anim > *:nth-child(4){animation-delay:.19s}
.fx-anim > *:nth-child(5){animation-delay:.24s}
.fx-anim > *:nth-child(6){animation-delay:.29s}
.fx-anim > *:nth-child(7){animation-delay:.34s}

/* ═══════════════════════════════════════════════════
   CARDS
═══════════════════════════════════════════════════ */
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--r-xl);
  padding:18px;
  box-shadow:var(--shadow-md);
}
.card-sm{padding:14px}
.card-xs{padding:11px 13px}
.card-flush{padding:0;overflow:hidden}
.card-surface{background:var(--surface)}
.card-navy{
  background:linear-gradient(145deg,var(--navy) 0%,var(--navy-mid) 50%,var(--navy-light) 100%);
  color:#fff;border:none;position:relative;overflow:hidden;
}
.card-navy::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 90% 10%,rgba(199,164,106,.18) 0%,transparent 55%),
    radial-gradient(ellipse at 10% 90%,rgba(255,255,255,.05) 0%,transparent 40%);
  pointer-events:none;
}
.card-navy-content{position:relative;z-index:1}
.card-warn{background:linear-gradient(135deg,#FFFBEB,#FEF5D7);border-color:#FDE68A}
.card-danger{background:#FFF5F5;border-color:#FECACA}
.card-green{background:#F0FDF4;border-color:#BBF7D0}

/* ═══════════════════════════════════════════════════
   TYPOGRAPHY
═══════════════════════════════════════════════════ */
.serif{font-family:var(--font-display);font-weight:300;letter-spacing:-.01em}
.h1{font-size:28px;font-weight:300;letter-spacing:-.01em;font-family:var(--font-display);line-height:1.15;color:var(--text-primary)}
.h2{font-size:22px;font-weight:300;letter-spacing:-.01em;font-family:var(--font-display);color:var(--text-primary)}
.h3{font-size:18px;font-weight:700;color:var(--text-primary)}
.h4{font-size:15px;font-weight:700;color:var(--text-primary)}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.body{font-size:14px;color:var(--text-secondary);line-height:1.55}
.small{font-size:13px}
.tiny{font-size:11.5px}
.muted{color:var(--muted)}
.white70{color:rgba(255,255,255,.72)}
.white90{color:rgba(255,255,255,.9)}
.gold{color:var(--gold)}

/* ═══════════════════════════════════════════════════
   BADGES & TAGS
═══════════════════════════════════════════════════ */
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700}
.badge-high{background:var(--danger-bg);color:var(--danger)}
.badge-medium{background:var(--warn-bg);color:#92400E}
.badge-low{background:var(--green-bg);color:var(--green)}
.badge-gold{background:rgba(199,164,106,.15);border:1px solid rgba(199,164,106,.3);color:var(--gold)}
.badge-navy{background:rgba(11,31,58,.08);color:var(--text-primary)}
.badge-blue{background:var(--accent-blue);color:var(--navy-mid)}
.status-dot{width:7px;height:7px;border-radius:999px;flex:none}
.dot-green{background:var(--green)}
.dot-warn{background:var(--warn)}
.dot-danger{background:var(--danger)}
.dot-muted{background:var(--muted-light)}

/* ═══════════════════════════════════════════════════
   LIST ITEMS
═══════════════════════════════════════════════════ */
.list-item{
  display:flex;align-items:center;gap:12px;padding:13px 14px;
  min-height:var(--touch-min);
  background:var(--surface);border-radius:var(--r-md);
  border:1px solid transparent;
  transition:background .15s;
}
.list-item:active{background:var(--line)}
.item-icon{
  width:40px;height:40px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:19px;flex:none;
}
.item-icon-sm{width:32px;height:32px;border-radius:10px;font-size:16px}
.icon-blue{background:var(--accent-blue)}
.icon-gold{background:rgba(199,164,106,.12)}
.icon-green{background:var(--green-bg)}
.icon-warn{background:var(--warn-bg)}
.icon-navy{background:rgba(11,31,58,.07)}
.chevron{font-size:20px;color:var(--muted-light);flex:none}

/* ═══════════════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════════════ */
.btn-primary{
  width:100%;padding:15px;
  min-height:var(--touch-min);border-radius:var(--r-md);
  background:linear-gradient(135deg,var(--navy),var(--navy-mid));
  color:#fff;font-weight:700;font-size:15px;
  box-shadow:0 3px 14px rgba(11,31,58,.22);
  transition:opacity .15s,transform .1s;
}
.btn-primary:active{opacity:.9;transform:scale(.99)}
.btn-secondary{
  width:100%;padding:14px;
  min-height:var(--touch-min);border-radius:var(--r-md);
  background:var(--card);color:var(--text-secondary);font-weight:600;font-size:14px;
  border:1.5px solid var(--line);
  transition:background .15s;
}
.btn-secondary:active{background:var(--surface)}
.btn-gold{
  padding:12px 20px;border-radius:var(--r-md);
  background:linear-gradient(135deg,var(--gold-light),var(--gold));
  color:var(--text-primary);font-weight:700;font-size:14px;
  box-shadow:0 3px 10px rgba(199,164,106,.3);
}
.btn-ghost{
  padding:8px 14px;border-radius:999px;
  background:transparent;color:var(--gold);font-weight:700;font-size:13px;
}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-icon{
  width:40px;height:40px;border-radius:12px;
  background:var(--surface);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;
}

/* ═══════════════════════════════════════════════════
   METRICS
═══════════════════════════════════════════════════ */
.metric-card{
  background:var(--card);border:1px solid var(--line);
  border-radius:var(--r-lg);padding:15px;
  box-shadow:var(--shadow-sm);
}
.metric-num{font-size:26px;font-weight:400;font-family:var(--font-display);color:var(--text-primary);line-height:1}
.metric-num-sm{font-size:20px}
.metric-label{font-size:11.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted-light);margin-bottom:4px}
.metric-sub{font-size:12px;color:var(--muted);margin-top:4px}
.trend-up{color:var(--danger)}
.trend-down{color:var(--green)}
.trend-flat{color:var(--warn)}

/* ═══════════════════════════════════════════════════
   BAR CHART
═══════════════════════════════════════════════════ */
.bar-chart{display:flex;align-items:flex-end;gap:7px;height:100px;padding:0 4px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar-fill{width:100%;border-radius:8px 8px 0 0;transition:height .6s cubic-bezier(.34,1.56,.64,1)}
.bar-navy{background:linear-gradient(180deg,#3a6cc8,#1a3a6b)}
.bar-gold{background:linear-gradient(180deg,var(--gold-light),var(--gold))}
.bar-teal{background:linear-gradient(180deg,#14b8a6,#0d9488)}
.bar-label{font-size:9.5px;color:var(--muted);font-weight:600}

/* ═══════════════════════════════════════════════════
   PROGRESS BARS
═══════════════════════════════════════════════════ */
.progress-track{height:8px;background:var(--surface);border-radius:999px;overflow:hidden;border:1px solid var(--line)}
.progress-fill{height:100%;border-radius:999px;transition:width .8s cubic-bezier(.4,0,.2,1)}

/* ═══════════════════════════════════════════════════
   TIMELINE
═══════════════════════════════════════════════════ */
.timeline{display:flex;flex-direction:column;gap:0}
.tl-item{display:flex;gap:14px;padding-bottom:18px;position:relative}
.tl-item:last-child{padding-bottom:0}
.tl-spine{display:flex;flex-direction:column;align-items:center;flex:none;width:24px}
.tl-dot{width:12px;height:12px;border-radius:999px;border:2px solid var(--navy);background:var(--card);flex:none;margin-top:3px}
.tl-dot.filled{background:var(--navy)}
.tl-dot.gold{border-color:var(--gold);background:var(--gold)}
.tl-line{width:2px;background:var(--line);flex:1;margin:4px 0 0}
.tl-item:last-child .tl-line{display:none}
.tl-content{flex:1;padding-top:1px}

/* ═══════════════════════════════════════════════════
   MINI CARDS / KV
═══════════════════════════════════════════════════ */
.kv-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.kv-card{background:var(--surface);border-radius:var(--r-md);padding:13px;border:1px solid var(--line);min-height:44px}
.kv-label{font-size:11.5px;color:var(--muted);font-weight:500;margin-bottom:5px}
.kv-value{font-size:15px;font-weight:700;color:var(--text-primary)}

/* ═══════════════════════════════════════════════════
   DIVIDER
═══════════════════════════════════════════════════ */
.divider{height:1px;background:var(--line);margin:14px 0}
.divider-sm{height:1px;background:var(--line);margin:10px 0}

/* ═══════════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════════ */
.modal-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.5);
  backdrop-filter:blur(8px);
  display:flex;align-items:flex-end;justify-content:center;
  animation:fadeIn .2s ease;
}
.modal-overlay.hidden{display:none}
.modal-sheet{
  background:var(--card-elevated);
  border-radius:32px 32px 0 0;
  padding:28px 22px calc(28px + env(safe-area-inset-bottom));
  width:min(430px,100vw);
  animation:slideUp .3s cubic-bezier(.34,1.56,.64,1);
  max-height:92dvh;
  overflow-y:auto;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--line-dark);border-radius:999px;margin:0 auto 22px}

/* ═══════════════════════════════════════════════════
   NOTIFICATION TOAST
═══════════════════════════════════════════════════ */
.toast{
  position:fixed;top:calc(72px + env(safe-area-inset-top));
  left:50%;transform:translateX(-50%);
  width:calc(min(430px,100vw) - 28px);
  background:var(--navy);color:#fff;
  border-radius:var(--r-lg);padding:13px 16px;
  display:flex;align-items:center;gap:12px;
  box-shadow:var(--shadow-lg);z-index:100;
  animation:slideDown .3s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;
}
.toast.hidden{display:none}
@keyframes slideDown{from{transform:translateX(-50%) translateY(-20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}

/* ═══════════════════════════════════════════════════
   SPARKLINE (inline SVG chart)
═══════════════════════════════════════════════════ */
.sparkline{overflow:visible}

/* ═══════════════════════════════════════════════════
   RING / DONUT
═══════════════════════════════════════════════════ */
.ring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center}
.ring-center{position:absolute;text-align:center;pointer-events:none}

/* ═══════════════════════════════════════════════════
   STEP LIST
═══════════════════════════════════════════════════ */
.step-list{display:flex;flex-direction:column;gap:10px}
.step-item{display:flex;gap:12px;align-items:flex-start}
.step-num{
  width:28px;height:28px;border-radius:999px;
  display:flex;align-items:center;justify-content:center;
  background:var(--navy);color:#fff;
  font-size:12px;font-weight:700;flex:none;
  box-shadow:0 2px 8px rgba(11,31,58,.18);
}
.step-num.gold{background:linear-gradient(135deg,var(--gold-light),var(--gold));color:var(--text-primary)}

/* ═══════════════════════════════════════════════════
   HEALTH SCORE DIAL
═══════════════════════════════════════════════════ */
.dial-wrap{display:flex;justify-content:center;padding:8px 0 4px}

/* ═══════════════════════════════════════════════════
   ICON PICKER
═══════════════════════════════════════════════════ */
.icon-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.icon-opt{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer}
.icon-opt span{font-size:11px;color:var(--muted);font-weight:600}
.icon-opt svg{border-radius:22px;box-shadow:var(--shadow-md);transition:transform .2s}
.icon-opt:active svg{transform:scale(.95)}
.icon-opt.selected svg{outline:3px solid var(--navy);outline-offset:3px}

/* ═══════════════════════════════════════════════════
   ACTIVITY RING
═══════════════════════════════════════════════════ */
.activity-ring{display:flex;gap:16px;align-items:center}
.ring-labels{display:flex;flex-direction:column;gap:8px;flex:1}
.ring-row{display:flex;align-items:center;gap:8px;font-size:13px}
.ring-dot{width:10px;height:10px;border-radius:999px;flex:none}

/* ═══════════════════════════════════════════════════
   SECTION HEADING
═══════════════════════════════════════════════════ */
.section-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 2px;margin-bottom:-4px;
}
.section-head-title{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-light)}

/* ═══════════════════════════════════════════════════
   SEARCH BAR
═══════════════════════════════════════════════════ */
.search-bar{
  display:flex;align-items:center;gap:10px;
  background:var(--surface);border:1px solid var(--line);
  border-radius:var(--r-md);padding:11px 14px;
  box-shadow:var(--shadow-sm);
}
.search-bar input{
  border:none;background:none;font:inherit;font-size:14px;
  color:var(--text-primary);flex:1;outline:none;
}
.search-bar input::placeholder{color:var(--muted-light)}

/* ═══════════════════════════════════════════════════
   TOGGLE
═══════════════════════════════════════════════════ */
.toggle{
  width:44px;height:26px;border-radius:999px;
  background:var(--green);position:relative;flex:none;
  transition:background .2s;
}
.toggle.off{background:var(--line-dark)}
.toggle::after{
  content:'';position:absolute;
  top:3px;width:20px;height:20px;border-radius:999px;
  background:var(--card);box-shadow:0 1px 4px rgba(0,0,0,.2);
  transition:left .2s;left:3px;
}
.toggle:not(.off)::after{left:21px}

/* ═══════════════════════════════════════════════════
   AVATAR
═══════════════════════════════════════════════════ */
.avatar{
  width:44px;height:44px;border-radius:999px;
  background:linear-gradient(135deg,var(--navy-mid),var(--navy-light));
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:700;font-size:17px;flex:none;
  font-family:var(--font-display);
}
.avatar-sm{width:34px;height:34px;font-size:13px}
.avatar-lg{width:64px;height:64px;font-size:26px}

/* ═══════════════════════════════════════════════════
   CALENDAR DOT
═══════════════════════════════════════════════════ */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center}
.cal-day{
  height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:12.5px;font-weight:500;color:var(--text-secondary);
  position:relative;
}
.cal-day.today{background:var(--navy);color:#fff;font-weight:700}
.cal-day.has-event::after{
  content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);
  width:4px;height:4px;border-radius:999px;background:var(--gold);
}
.cal-day.today.has-event::after{background:var(--gold-light)}
.cal-header{font-size:11px;font-weight:700;color:var(--muted-light);text-transform:uppercase;letter-spacing:.05em;height:24px;display:flex;align-items:center;justify-content:center}


/* ── HIG: Focus visibility for VoiceOver / keyboard navigation ── */
:focus-visible{
  outline:3px solid var(--gold);
  outline-offset:2px;
  border-radius:4px;
}
button:focus-visible{
  outline:3px solid var(--gold);
  outline-offset:2px;
}
/* Remove default outline when using touch */
:focus:not(:focus-visible){ outline:none; }

</style>

<script>
/* ═══════════════════════════════════════════════════

═══════════════════════════════════════════════════ */
const S = {

  stack: [],            // [{id, params}]

/* ═══════════════════════════════════════════════════

  {name:'Maria Chen', risk:'medium', reason:'Medication adherence variance', detail:'2 missed doses this week', initials:'MC', last:'Yesterday'},

  {name:'Tom Westfield', risk:'low', reason:'Post-intervention follow-up', detail:'Metrics improving post-discharge', initials:'TW', last:'Yesterday'},
];

const CALENDAR_EVENTS = [
  {day:23, label:'Care Coordinator Check-in', time:'10:00 AM'},
  {day:25, label:'Blood Pressure Check', time:'8:00 AM'},
  {day:28, label:'Dr. Mitchell Follow-up', time:'2:30 PM'},
  {day:30, label:'Medication Refill Reminder', time:'All day'},
];

/* ═══════════════════════════════════════════════════
   ROUTING
═══════════════════════════════════════════════════ */
function navigate(screenId, params={}) {
  S.stack.push({id:screenId, params});
  renderApp();
}
function goBack() {
  if (S.stack.length > 0) { S.stack.pop(); renderApp(); }
}
function switchTab(tab) {
  S.tab = tab;
  S.stack = [];
  S.platform = 'patient';
  renderApp();
}
function switchPlatform(plat) {
  S.platform = plat;
  S.stack = [];
  renderApp();
}

function currentScreen() {
  if (S.stack.length > 0) return S.stack[S.stack.length-1];
  return {id: S.tab, params:{}};
}

function screenTitle() {
  const cur = currentScreen();
  const MAP = {
    home:'Home', care:'Care', monitor:'Monitor', records:'Records', more:'More',
    'alert-detail':'Alert Detail', 'care-plan':'Care Plan',
    'medication-detail':'Medication', 'metric-detail':'Metric Detail',
    'record-detail':'Record', 'escalation':'Escalation Flow',
    'settings':'Settings', 'profile':'My Profile', 'calendar':'Calendar',
    'devices':'Connected Devices', 'care-team':'Care Team',
    'disease-programs':'Condition Programs', 'support':'Support',
    'notifications':'Notifications', clinician:'Clinician', employer:'Employer',
  };
  return MAP[cur.id] || 'Self-Care OS';
}

/* ═══════════════════════════════════════════════════
   RENDER ENGINE
═══════════════════════════════════════════════════ */
function renderApp() {
  const titleEl = document.getElementById('screenName');
  const backBtn = document.getElementById('btnBack');
  const brandMark = document.getElementById('brandMark');
  const liveDot = document.getElementById('liveDot');
  const tabbar = document.getElementById('tabbar');

  titleEl.textContent = screenTitle();
  const showBack = S.stack.length > 0;
  backBtn.classList.toggle('hidden', !showBack);
  brandMark.classList.toggle('hidden', showBack);

  // Tab bar highlight
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === S.tab && S.stack.length === 0 && S.platform === 'patient'));

  // Hide tabbar on detail views for clinician/employer
  tabbar.style.opacity = '1';

  const container = document.getElementById('screens');
  const screen = document.createElement('div');
  screen.className = 'screen';
  screen.style.padding = '14px 14px 0';

  const cur = currentScreen();

  if (S.platform === 'clinician') renderClinician(screen);
  else if (S.platform === 'employer') renderEmployer(screen);
  else {
    switch(cur.id) {
      case 'home': renderHome(screen); break;
      case 'care': renderCare(screen); break;
      case 'monitor': renderMonitor(screen); break;
      case 'records': renderRecords(screen); break;
      case 'more': renderMore(screen); break;
      case 'alert-detail': renderAlertDetail(screen, cur.params); break;
      case 'medication-detail': renderMedicationDetail(screen, cur.params); break;
      case 'metric-detail': renderMetricDetail(screen, cur.params); break;
      case 'record-detail': renderRecordDetail(screen, cur.params); break;
      case 'care-plan': renderCarePlan(screen); break;
      case 'escalation': renderEscalation(screen); break;
      case 'settings': renderSettings(screen); break;
      case 'profile': renderProfile(screen); break;
      case 'calendar': renderCalendar(screen); break;
      case 'devices': renderDevices(screen); break;
      case 'care-team': renderCareTeam(screen); break;
      case 'disease-programs': renderDiseasePrograms(screen); break;
      case 'support': renderSupport(screen); break;
      case 'notifications': renderNotifications(screen); break;
      default: renderHome(screen);
    }
  }

  // Replace screen
  const old = container.querySelector('.screen');
  if (old) container.removeChild(old);
  container.appendChild(screen);

  // Platform switcher (shown on top-level views)
  ensurePlatformBar(screen, cur.id);
}

function ensurePlatformBar(screen, screenId) {
  const topScreens = ['home','care','monitor','records','more'];
  if (!topScreens.includes(screenId) && S.platform === 'patient') return;
  if (S.stack.length > 0 && S.platform === 'patient') return;

  const bar = document.createElement('div');
  bar.className = 'card card-sm';
  bar.style.marginBottom = '12px';
  bar.innerHTML = `<div class="platform-bar">
    ${['patient','clinician','employer'].map(p=>`<button class="plat-btn${S.platform===p?' active':''}" data-plat="${p}">${p==='patient'?'Patient App':p.charAt(0).toUpperCase()+p.slice(1)}</button>`).join('')}
  </div>`;
  bar.querySelectorAll('.plat-btn').forEach(b => b.addEventListener('click', () => switchPlatform(b.dataset.plat)));
  screen.insertBefore(bar, screen.firstChild);
}

/* ═══════════════════════════════════════════════════
   HOME
═══════════════════════════════════════════════════ */
function renderHome(root) {
  root.innerHTML = '';
  const stack = div('stack fx-anim');

  // Hero
  const hero = div('card card-navy');
  hero.innerHTML = `<div class="card-navy-content">

        <div style="font-size:24px;font-weight:300;letter-spacing:-.01em;font-family:var(--font-display);color:#fff;line-height:1.1">Ed Valentine</div>
      </div>
      <div class="avatar" style="background:rgba(255,255,255,.12);color:#fff;border:1.5px solid rgba(255,255,255,.2)">E</div>

    <div class="small muted" style="line-height:1.55">This demonstrates how the Self-Care OS converts continuous health signals into preventive care workflows before a patient reaches a high-cost event.</div>`;
  stack.appendChild(header);

  const steps = [
    {icon:'😴', title:'Sleep deficit detected', body:'Wearable data shows 6h 42m — below the 7h minimum threshold for 3 consecutive nights.', color:'var(--purple)'},
    {icon:'💓', title:'Resting HR rises above baseline', body:'Heart rate of 74 bpm detected. Baseline 66–69 bpm. Anomaly flag triggered by AI monitoring layer.', color:'var(--danger)'},
    {icon:'🤖', title:'AI risk model flags early deterioration', body:'Pattern matching against 47-day personal baseline identifies a combined sleep-HR deterioration cluster.', color:'var(--navy-mid)'},
    {icon:'⚙️', title:'Control plane evaluates escalation rules', body:'Self-Care OS evaluates rule set: priority, patient history, care team availability, and intervention protocol.', color:'var(--teal)'},
    {icon:'📲', title:'Patient outreach initiated', body:'Push notification sent to Ed. Confirmation requested for symptoms, hydration, and medication adherence.', color:'var(--warn)'},
    {icon:'👩‍⚕️', title:'Clinician review triggered', body:'If no response within 2 hours, case escalated to care coordinator James Hooper for direct outreach.', color:'var(--gold)'},
  ];

  const tlCard = div('card');
  tlCard.innerHTML = `<div class="h4" style="margin-bottom:16px">Escalation timeline</div>
    <div class="timeline" id="tlList"></div>
    <button class="btn-primary" style="margin-top:18px" id="simBtn">Advance Simulation →</button>`;
  const tlList = tlCard.querySelector('#tlList');

  function renderSteps() {
    tlList.innerHTML = '';
    steps.forEach((s,i) => {
      const item = document.createElement('div');
      item.className = 'tl-item';
      item.style.opacity = i <= S.simStep ? '1' : '0.28';
      item.style.transition = 'opacity .4s';
      item.innerHTML = `<div class="tl-spine">
        <div class="tl-dot ${i<=S.simStep?'filled':''}"></div>
        <div class="tl-line"></div>
      </div>
      <div class="tl-content">

        </div>
        <div class="small muted" style="line-height:1.5">${s.body}</div>
      </div>`;
      tlList.appendChild(item);
    });
    const simBtn = tlCard.querySelector('#simBtn');
    simBtn.textContent = S.simStep >= steps.length-1 ? 'Reset Simulation ↺' : 'Advance Simulation →';
  }

  renderSteps();
  tlCard.querySelector('#simBtn').addEventListener('click', () => {
    S.simStep = S.simStep < steps.length-1 ? S.simStep+1 : 0;
    renderSteps();
  });
  stack.appendChild(tlCard);

  // Summary
  const sumCard = div('card card-navy');
  sumCard.innerHTML = `<div class="card-navy-content">
    <div style="font-size:13px;color:rgba(255,255,255,.6);margin-bottom:6px;font-weight:600;letter-spacing:.06em;text-transform:uppercase">Key outcome</div>

  stack.appendChild(sumCard);

  root.appendChild(stack);
}

═══════════════════════════════════════════════════ */
function renderNotifications(root) {
  root.innerHTML = '';
  const stack = div('stack fx-anim');

  const prefs = [
    ['Medication reminders', 'Daily dose confirmation alerts', true],
    ['Alert notifications', 'High and medium priority health alerts', true],
    ['Care team messages', 'Messages from your clinical team', true],
    ['Appointment reminders', '24h and 1h before appointments', true],
    ['Weekly health summary', 'Sunday evening digest', false],
    ['Research & tips', 'Condition-specific health insights', false],
  ];

  const hdr = div('card');
  hdr.innerHTML = `<div class="h2" style="margin-bottom:6px">Notifications</div>
    <div class="small muted">Manage your alert preferences and notification channels.</div>`;
  stack.appendChild(hdr);

  const prefCard = div('card');
  prefCard.innerHTML = `<div class="h4" style="margin-bottom:12px">Alert preferences</div>
    <div class="stack-sm" id="prefList"></div>`;
  const prefList = prefCard.querySelector('#prefList');
  prefs.forEach(([label,sub,on]) => {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)';
    row.innerHTML = `<div style="flex:1">
      <div style="font-weight:600;font-size:13.5px">${label}</div>
      <div class="tiny muted" style="margin-top:2px">${sub}</div>
    </div>
    <div class="toggle ${on?'':'off'}" id="toggle_${label.replace(/\s/g,'_')}"></div>`;
    const tog = row.querySelector('.toggle');
    tog.addEventListener('click', () => tog.classList.toggle('off'));
    prefList.appendChild(row);
  });
  stack.appendChild(prefCard);

  root.appendChild(stack);
}

/* ═══════════════════════════════════════════════════
   SETTINGS
═══════════════════════════════════════════════════ */
function renderSettings(root) {
  root.innerHTML = '';
  const stack = div('stack fx-anim');

  const hdr = div('card');
  hdr.innerHTML = `<div class="h2" style="margin-bottom:6px">Settings</div>
    <div class="small muted">Privacy, security, and app preferences.</div>`;
  stack.appendChild(hdr);

  const groups = [
    {title:'Security', items:[
      ['Face ID / Biometrics', 'On', 'toggle'],
      ['Auto-lock', '5 minutes', 'value'],
      ['Change passcode', '', 'chevron'],
    ]},
    {title:'Privacy', items:[
      ['Data sharing', 'Care team only', 'value'],
      ['Usage analytics', 'Opt out', 'value'],
      ['Download my data', '', 'chevron'],
      ['Delete account', '', 'danger'],
    ]},
    {title:'App', items:[
      ['Theme', 'Light', 'value'],
      ['Language', 'English (US)', 'value'],
      ['Haptics', 'On', 'toggle'],
      ['App version', '2.4.1', 'value'],
    ]},
  ];

  groups.forEach(g => {
    const card = div('card');
    card.innerHTML = `<div class="h4" style="margin-bottom:12px">${g.title}</div>
      <div class="stack-sm" id="sg_${g.title}"></div>`;
    const list = card.querySelector(`#sg_${g.title}`);
    g.items.forEach(([label,val,type]) => {
      const row = document.createElement('div');
      row.style.cssText = `display:flex;justify-content:space-between;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)`;
      row.innerHTML = `<div style="font-weight:600;font-size:13.5px;${type==='danger'?'color:var(--danger)':''}">${label}</div>
        <div>
          ${type==='toggle'?`<div class="toggle" id="stog_${label.replace(/\s/g,'')}"></div>`:
            type==='value'?`<div class="small muted">${val}</div>`:
            type==='danger'?'':
            `<div class="chevron" style="font-size:18px;color:var(--muted-light)">›</div>`}
        </div>`;
      const tog = row.querySelector('.toggle');
      if (tog) tog.addEventListener('click', () => tog.classList.toggle('off'));
      list.appendChild(row);
    });
    stack.appendChild(card);
  });

  const signout = document.createElement('button');
  signout.className = 'btn-secondary';
  signout.style.color = 'var(--danger)';
  signout.textContent = 'Sign out';
  signout.addEventListener('click', () => showToast('Signed out','See you next time, Ed.'));
  stack.appendChild(signout);

  root.appendChild(stack);
}

/* ═══════════════════════════════════════════════════
   ICON PICKER
═══════════════════════════════════════════════════ */
const ICONS = [
  {id:'1', name:'Pulse', svg: makeSVGIcon('pulse')},
  {id:'2', name:'Shield', svg: makeSVGIcon('shield')},
  {id:'3', name:'Vitality', svg: makeSVGIcon('vitality')},
  {id:'4', name:'Classic', svg: makeSVGIcon('classic')},
  {id:'5', name:'Orbit', svg: makeSVGIcon('orbit')},
  {id:'6', name:'Signal', svg: makeSVGIcon('signal')},
];

function makeSVGIcon(type) {
  const svgNS = 'http://www.w3.org/2000/svg';
  const s = document.createElementNS(svgNS,'svg');
  s.setAttribute('width','78'); s.setAttribute('height','78');
  s.setAttribute('viewBox','0 0 78 78');

  // Background
  const defs = document.createElementNS(svgNS,'defs');
  const grad = document.createElementNS(svgNS,'linearGradient');
  grad.setAttribute('id',`g_${type}`); grad.setAttribute('x1','0'); grad.setAttribute('y1','0'); grad.setAttribute('x2','1'); grad.setAttribute('y2','1');
  const stops = type==='vitality' ? [['0%','#C7A46A'],['100%','#9a7540']] : [['0%','#0B1F3A'],['100%','#1a3d7a']];
  stops.forEach(([o,c]) => { const st=document.createElementNS(svgNS,'stop'); st.setAttribute('offset',o); st.setAttribute('stop-color',c); grad.appendChild(st); });
  defs.appendChild(grad);
  s.appendChild(defs);
  const rect = document.createElementNS(svgNS,'rect');
  rect.setAttribute('width','78'); rect.setAttribute('height','78'); rect.setAttribute('rx','19'); rect.setAttribute('fill',`url(#g_${type})`);
  s.appendChild(rect);

  const gold = '#C7A46A'; const goldb = '#e8c488';
  if (type==='pulse') {
    const glow = document.createElementNS(svgNS,'circle');
    glow.setAttribute('cx','62'); glow.setAttribute('cy','16'); glow.setAttribute('r','22'); glow.setAttribute('fill','rgba(199,164,106,.1)');
    s.appendChild(glow);
    const pl = document.createElementNS(svgNS,'polyline');
    pl.setAttribute('points','12,39 20,39 26,27 33,51 39,31 45,45 51,39 66,39');
    pl.setAttribute('fill','none'); pl.setAttribute('stroke',gold); pl.setAttribute('stroke-width','2.8'); pl.setAttribute('stroke-linecap','round'); pl.setAttribute('stroke-linejoin','round');
    s.appendChild(pl);
    const ck = document.createElementNS(svgNS,'circle');
    ck.setAttribute('cx','39'); ck.setAttribute('cy','58'); ck.setAttribute('r','7.5'); ck.setAttribute('fill','rgba(199,164,106,.15)'); ck.setAttribute('stroke',gold); ck.setAttribute('stroke-width','1.5');
    s.appendChild(ck);
    const chk = document.createElementNS(svgNS,'polyline');
    chk.setAttribute('points','35.5,58 38,60.5 43,55'); chk.setAttribute('fill','none'); chk.setAttribute('stroke',gold); chk.setAttribute('stroke-width','1.8'); chk.setAttribute('stroke-linecap','round'); chk.setAttribute('stroke-linejoin','round');
    s.appendChild(chk);
  } else if (type==='shield') {
    const sh = document.createElementNS(svgNS,'path');
    sh.setAttribute('d','M39 14 L55 23 L55 41 C55 52 39 60 39 60 C39 60 23 52 23 41 L23 23 Z');
    sh.setAttribute('fill','rgba(199,164,106,.18)'); sh.setAttribute('stroke',gold); sh.setAttribute('stroke-width','1.8');
    s.appendChild(sh);
    const chk = document.createElementNS(svgNS,'polyline');
    chk.setAttribute('points','31,38 37,44 48,31'); chk.setAttribute('fill','none'); chk.setAttribute('stroke',goldb); chk.setAttribute('stroke-width','2.8'); chk.setAttribute('stroke-linecap','round'); chk.setAttribute('stroke-linejoin','round');
    s.appendChild(chk);
  } else if (type==='vitality') {
    const ring = document.createElementNS(svgNS,'circle');
    ring.setAttribute('cx','39'); ring.setAttribute('cy','34'); ring.setAttribute('r','14'); ring.setAttribute('fill','rgba(255,255,255,.15)'); ring.setAttribute('stroke','rgba(255,255,255,.7)'); ring.setAttribute('stroke-width','1.8');
    s.appendChild(ring);
    const drop = document.createElementNS(svgNS,'path');
    drop.setAttribute('d','M39 22 C39 22 45 30 45 35 C45 38.3 42.3 41 39 41 C35.7 41 33 38.3 33 35 C33 30 39 22 39 22Z');
    drop.setAttribute('fill','rgba(255,255,255,.9)');
    s.appendChild(drop);
    [46,50,54].forEach((y,i) => {
      const bar = document.createElementNS(svgNS,'rect');
      const w=[10,16,10][i]; const x=39-w/2;
      bar.setAttribute('x',String(x)); bar.setAttribute('y',String(y)); bar.setAttribute('width',String(w)); bar.setAttribute('height','2.5'); bar.setAttribute('rx','1.25'); bar.setAttribute('fill',`rgba(255,255,255,${[.9,.7,.5][i]})`);
      s.appendChild(bar);
    });
  } else if (type==='classic') {
    const bg2 = document.createElementNS(svgNS,'circle');
    bg2.setAttribute('cx','39'); bg2.setAttribute('cy','39'); bg2.setAttribute('r','33'); bg2.setAttribute('fill','none'); bg2.setAttribute('stroke','rgba(199,164,106,.1)'); bg2.setAttribute('stroke-width','1');
    s.appendChild(bg2);
    const vbar = document.createElementNS(svgNS,'rect');
    vbar.setAttribute('x','35'); vbar.setAttribute('y','20'); vbar.setAttribute('width','8'); vbar.setAttribute('height','38'); vbar.setAttribute('rx','4'); vbar.setAttribute('fill',gold);
    s.appendChild(vbar);
    const hbar = document.createElementNS(svgNS,'rect');
    hbar.setAttribute('x','20'); hbar.setAttribute('y','35'); hbar.setAttribute('width','38'); hbar.setAttribute('height','8'); hbar.setAttribute('rx','4'); hbar.setAttribute('fill',gold);
    s.appendChild(hbar);
  } else if (type==='orbit') {
    [20,12].forEach(r => {
      const ring = document.createElementNS(svgNS,'circle');
      ring.setAttribute('cx','39'); ring.setAttribute('cy','39'); ring.setAttribute('r',String(r)); ring.setAttribute('fill','none'); ring.setAttribute('stroke','rgba(199,164,106,.22)'); ring.setAttribute('stroke-width','1.2');
      s.appendChild(ring);
    });
    const core = document.createElementNS(svgNS,'circle');
    core.setAttribute('cx','39'); core.setAttribute('cy','39'); core.setAttribute('r','5.5'); core.setAttribute('fill',gold);
    s.appendChild(core);
    [[59,39,3.5],[39,19,2.5],[21,49,2]].forEach(([cx,cy,r],i) => {
      const sat = document.createElementNS(svgNS,'circle');
      sat.setAttribute('cx',String(cx)); sat.setAttribute('cy',String(cy)); sat.setAttribute('r',String(r)); sat.setAttribute('fill',`rgba(199,164,106,${[1,.65,.45][i]})`);
      s.appendChild(sat);
    });
  } else if (type==='signal') {
    [[14,35,8,.5],[22,28,20,.65],[30,22,32,.8],[38,18,42,1],[46,24,30,.8],[54,30,18,.62],[62,35,8,.42]].forEach(([x,y,h,o]) => {
      const bar = document.createElementNS(svgNS,'rect');
      bar.setAttribute('x',String(x)); bar.setAttribute('y',String(y)); bar.setAttribute('width','5'); bar.setAttribute('height',String(h)); bar.setAttribute('rx','2.5'); bar.setAttribute('fill',gold); bar.setAttribute('opacity',String(o));
      s.appendChild(bar);
    });
  }
  return s;
}

function initIconPicker() {
  const grid = document.getElementById('iconGrid');
  ICONS.forEach(ic => {
    const opt = document.createElement('div');
    opt.className = `icon-opt ${ic.id===S.selectedIcon?'selected':''}`;
    opt.dataset.id = ic.id;
    opt.appendChild(ic.svg.cloneNode(true));
    const label = document.createElement('span');
    label.textContent = ic.name;
    opt.appendChild(label);
    opt.addEventListener('click', () => {
      S.selectedIcon = ic.id;
      grid.querySelectorAll('.icon-opt').forEach(o => o.classList.toggle('selected', o.dataset.id===ic.id));
      // Update brand mark
      const bm = document.getElementById('brandMark');
      bm.innerHTML = '';
      const iconSvg = makeSVGIcon(['pulse','shield','vitality','classic','orbit','signal'][parseInt(ic.id)-1]);
      iconSvg.style.cssText = 'width:34px;height:34px;border-radius:10px';
      bm.style.background = 'none';
      bm.style.boxShadow = 'none';
      bm.style.padding = '0';
      bm.appendChild(iconSvg);
    });
    grid.appendChild(opt);
  });

  document.getElementById('btnIconPicker').addEventListener('click', () => {
    document.getElementById('iconModal').classList.remove('hidden');
  });
  document.getElementById('iconDone').addEventListener('click', () => {
    document.getElementById('iconModal').classList.add('hidden');
    showToast('Icon updated','Your app icon has been saved.');
  });
  document.getElementById('iconModal').addEventListener('click', e => {
    if (e.target===document.getElementById('iconModal')) document.getElementById('iconModal').classList.add('hidden');
  });
}

/* ═══════════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════════ */
function div(cls, clickable=false, attrs={}) {
  const el = document.createElement('div');
  if (cls) el.className = cls;
  Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k,v));
  if (clickable) el.style.cursor = 'pointer';
  return el;
}

function trendIcon(trend) {
  if (trend==='up') return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2.5" stroke-linecap="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>`;
  if (trend==='down') return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--warn)" stroke-width="2.5" stroke-linecap="round"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>`;
  return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
}

function trendBadge(trend) {
  if (trend==='up') return `<div class="badge badge-high">Rising</div>`;
  if (trend==='down') return `<div class="badge badge-medium">Below target</div>`;
  return `<div class="badge badge-low">Stable</div>`;
}

function sparkline(data, color='#1D4ED8') {
  const w=80, h=36, pad=2;
  const min=Math.min(...data), max=Math.max(...data), range=max-min||1;
  const pts = data.map((v,i) => {
    const x = pad + (i/(data.length-1))*(w-2*pad);
    const y = h-pad-(((v-min)/range)*(h-2*pad));
    return `${x},${y}`;
  }).join(' ');
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" class="sparkline">
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity=".8"/>
    <circle cx="${pts.split(' ').pop().split(',')[0]}" cy="${pts.split(' ').pop().split(',')[1]}" r="3" fill="${color}"/>
  </svg>`;
}

function healthScoreRing(score) {
  const r=28, circ=2*Math.PI*r, dash=(score/100)*circ;
  return `<div class="ring-wrap">
    <svg width="76" height="76" viewBox="0 0 76 76">
      <circle cx="38" cy="38" r="${r}" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="5"/>
      <circle cx="38" cy="38" r="${r}" fill="none" stroke="${score>=80?'#4ade80':score>=60?'var(--gold-light)':'#f87171'}" stroke-width="5"
        stroke-dasharray="${dash} ${circ}" stroke-dashoffset="${circ*0.25}" stroke-linecap="round" transform="rotate(-90 38 38)" opacity=".9"/>
    </svg>
  </div>`;
}

let toastTimer;
function showToast(title, body) {
  const toast = document.getElementById('toast');
  document.getElementById('toastTitle').textContent = title;
  document.getElementById('toastBody').textContent = body;
  toast.classList.remove('hidden');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.add('hidden'), 3000);
}

  btn.addEventListener('click', () => switchTab(btn.dataset.tab));

/* ═══════════════════════════════════════════════════
   HIG: DARK / LIGHT MODE TOGGLE
═══════════════════════════════════════════════════ */
(function() {
  const root = document.documentElement;
  const btn = document.getElementById('btnTheme');
  const icon = document.getElementById('themeIcon');

  const SUN_PATH = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
  const MOON_PATH = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';

  function isDark() {
    return root.dataset.theme === 'dark' ||
      (!root.dataset.theme && window.matchMedia('(prefers-color-scheme: dark)').matches);
  }

  function applyTheme(dark) {
    root.dataset.theme = dark ? 'dark' : 'light';
    icon.innerHTML = dark ? SUN_PATH : MOON_PATH;
    btn.setAttribute('aria-label', dark ? 'Switch to light mode' : 'Switch to dark mode');
    btn.setAttribute('aria-pressed', String(dark));
  }

  // Init from system
  applyTheme(isDark());

  btn.addEventListener('click', () => applyTheme(!isDark()));

  // React to OS-level changes
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
    if (!root.dataset.theme) applyTheme(e.matches);
  });
})();
</script>
