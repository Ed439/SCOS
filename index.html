<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<!--
  VIEWPORT: viewport-fit=cover extends the canvas under the notch/Dynamic Island.
  Combined with the apple-mobile-web-app meta tags, this enables full PWA mode.
-->
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Self-Care OS"/>
<meta name="color-scheme" content="light dark"/>
<title>Self-Care OS</title>
<style>
/* ════════════════════════════════════════════════════════════════
   DESIGN TOKENS
   Brand palette + semantic colour tokens with full dark-mode support
════════════════════════════════════════════════════════════════ */
:root {
  /* Brand — never change between light/dark */
  --navy:        #0B1F3A;
  --navy-mid:    #163560;
  --navy-light:  #1d4a8a;
  --gold:        #C7A46A;
  --gold-light:  #e8c488;

  /* Semantic — light mode defaults */
  --bg:          #EEF1F8;
  --surface:     #F5F7FC;
  --card:        #FFFFFF;
  --card-2:      #FFFFFF;
  --text-1:      #0B1F3A;
  --text-2:      #334155;
  --text-3:      #64748B;
  --text-4:      #94a3b8;
  --line:        #E2E8F0;
  --line-2:      #CBD5E1;
  --blue-tint:   #EEF3FF;
  --danger:      #DC2626;
  --danger-bg:   #FEE2E2;
  --warn:        #F59E0B;
  --warn-bg:     #FEF3C7;
  --green:       #16A34A;
  --green-bg:    #DCFCE7;

  /* Radii */
  --r4: 4px; --r8: 8px; --r12: 12px; --r16: 16px;
  --r20: 20px; --r24: 24px; --r32: 32px;

  /* Shadows */
  --sh1: 0 1px 4px rgba(11,31,58,.06);
  --sh2: 0 2px 12px rgba(11,31,58,.09);
  --sh3: 0 4px 24px rgba(11,31,58,.12);

  /* Typography — SF Pro system stack with better cross-platform fallbacks */
  --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, "Helvetica Neue", Helvetica, Arial, sans-serif;
  --font-d: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, "Helvetica Neue", Helvetica, Arial, sans-serif;

  /* iOS safe areas — default 0, overridden by env() where supported */
  --sat: env(safe-area-inset-top,    0px);
  --sab: env(safe-area-inset-bottom, 0px);
  --sal: env(safe-area-inset-left,   0px);
  --sar: env(safe-area-inset-right,  0px);

  /* Touch minimum per HIG */
  --touch: 44px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg:        #0F1923;
    --surface:   #1C2733;
    --card:      #1E2D3D;
    --card-2:    #253346;
    --text-1:    #F0F4F8;
    --text-2:    #CBD5E1;
    --text-3:    #94A3B8;
    --text-4:    #64748B;
    --line:      #2A3A4A;
    --line-2:    #374859;
    --blue-tint: #162032;
    --danger-bg: rgba(220,38,38,.18);
    --warn-bg:   rgba(245,158,11,.15);
    --green-bg:  rgba(22,163,74,.15);
    --sh1: 0 1px 4px rgba(0,0,0,.25);
    --sh2: 0 2px 12px rgba(0,0,0,.35);
    --sh3: 0 4px 24px rgba(0,0,0,.45);
  }
}
[data-theme="dark"] {
  --bg:#0F1923; --surface:#1C2733; --card:#1E2D3D; --card-2:#253346;
  --text-1:#F0F4F8; --text-2:#CBD5E1; --text-3:#94A3B8; --text-4:#64748B;
  --line:#2A3A4A; --line-2:#374859; --blue-tint:#162032;
  --danger-bg:rgba(220,38,38,.18); --warn-bg:rgba(245,158,11,.15); --green-bg:rgba(22,163,74,.15);
  --sh1:0 1px 4px rgba(0,0,0,.25); --sh2:0 2px 12px rgba(0,0,0,.35); --sh3:0 4px 24px rgba(0,0,0,.45);
}
[data-theme="light"] {
  --bg:#EEF1F8; --surface:#F5F7FC; --card:#FFFFFF; --card-2:#FFFFFF;
  --text-1:#0B1F3A; --text-2:#334155; --text-3:#64748B; --text-4:#94a3b8;
  --line:#E2E8F0; --line-2:#CBD5E1; --blue-tint:#EEF3FF;
  --danger-bg:#FEE2E2; --warn-bg:#FEF3C7; --green-bg:#DCFCE7;
  --sh1:0 1px 4px rgba(11,31,58,.06); --sh2:0 2px 12px rgba(11,31,58,.09); --sh3:0 4px 24px rgba(11,31,58,.12);
}

/* ════════════════════════════════════════════════════════════════
   RESET
════════════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  height: 100%;
  font-family: var(--font);
  font-size: 15px;
  line-height: 1.5;
  color: var(--text-1);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  -webkit-text-size-adjust: 100%;
  overscroll-behavior: none;
  overflow: hidden;
}
button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
svg { display: block; flex-shrink: 0; }
img { display: block; max-width: 100%; }
input { font: inherit; }

/* ════════════════════════════════════════════════════════════════
   APP SHELL — THE LAYOUT FOUNDATION
   
   Strategy: one fixed-position container fills the exact visible
   viewport. Uses padding to push content below status bar (top)
   and above home indicator (bottom). The JS measures exact insets
   on first paint and applies them.
   
   This approach works correctly in BOTH browser and PWA mode.
════════════════════════════════════════════════════════════════ */
#app {
  position: relative;
  width: 100%;
  height: 100vh;
  height: 100dvh; /* modern browsers — accounts for mobile browser chrome */
  max-width: 430px;
  margin: 0 auto;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  overflow: hidden;

  /*
    Safe area padding — only relevant on iOS devices with notch/Dynamic Island.
    env() returns 0px on non-iOS, so layout is unaffected on desktop.
  */
  padding-top:    var(--sat);
  padding-bottom: var(--sab);
  padding-left:   var(--sal);
  padding-right:  var(--sar);
}

/* ════════════════════════════════════════════════════════════════
   TOP BAR
   flex-shrink:0 so it never collapses.
   No padding-top here — #app's padding-top handles the status bar.
════════════════════════════════════════════════════════════════ */
#topbar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 10px 16px;
  min-height: var(--touch);
  background: var(--bg);
  border-bottom: 1px solid var(--line);
  position: relative;
  z-index: 10;
}
.tb-left  { display: flex; align-items: center; gap: 10px; }
.tb-right { display: flex; align-items: center; gap: 8px; }
.tb-brand { font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: var(--text-4); font-weight: 600; }
.tb-title { font-family: var(--font-d); font-size: 18px; font-weight: 700; color: var(--text-1); line-height: 1.1; }

.btn-back {
  width: var(--touch); height: var(--touch);
  display: flex; align-items: center; justify-content: center;
  border-radius: 999px;
  background: var(--card);
  border: 1.5px solid var(--line);
  box-shadow: var(--sh1);
  flex-shrink: 0;
}
.brand-mark {
  width: 34px; height: 34px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--navy), var(--navy-light));
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(11,31,58,.25);
  flex-shrink: 0;
}
.pill-btn {
  height: var(--touch);
  display: flex; align-items: center; gap: 5px;
  padding: 0 12px;
  background: var(--blue-tint);
  border: 1px solid var(--line);
  border-radius: 999px;
  font-size: 12px; font-weight: 700;
  color: var(--text-1);
  white-space: nowrap;
}
.live-dot {
  width: 7px; height: 7px;
  border-radius: 999px;
  background: var(--green);
  animation: pulse 2s infinite;
  flex-shrink: 0;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ════════════════════════════════════════════════════════════════
   PLATFORM SWITCHER
════════════════════════════════════════════════════════════════ */
#plat-bar {
  flex-shrink: 0;
  display: flex;
  gap: 7px;
  padding: 10px 14px 6px;
  overflow-x: auto;
  scrollbar-width: none;
  background: var(--bg);
}
#plat-bar::-webkit-scrollbar { display: none; }
.plat-btn {
  flex-shrink: 0;
  height: var(--touch);
  padding: 0 16px;
  border-radius: 14px;
  font-size: 13px; font-weight: 700;
  background: var(--surface);
  color: var(--text-2);
  border: 1px solid var(--line);
  transition: background .15s, color .15s, border-color .15s;
}
.plat-btn.active {
  background: var(--navy);
  color: #fff;
  border-color: var(--navy);
  box-shadow: 0 2px 8px rgba(11,31,58,.22);
}

/* ════════════════════════════════════════════════════════════════
   SCROLL AREA — fills all remaining space between topbar and tabbar
════════════════════════════════════════════════════════════════ */
#scroller {
  flex: 1;
  min-height: 0;       /* critical for flex children to shrink */
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
  scrollbar-width: none;
}
#scroller::-webkit-scrollbar { display: none; }

/* Padding inside scroller so content has breathing room */
.screen-pad { padding: 12px 14px 20px; }

/* ════════════════════════════════════════════════════════════════
   TAB BAR
   flex-shrink:0 so it never collapses.
   No padding-bottom here — #app's padding-bottom handles home indicator.
════════════════════════════════════════════════════════════════ */
#tabbar {
  flex-shrink: 0;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  background: var(--card);
  border-top: 1px solid var(--line);
  padding: 6px 4px 8px;
}
.tab-btn {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 6px 4px;
  min-height: var(--touch);
  border-radius: var(--r12);
  color: var(--text-4);
  font-size: 10px; font-weight: 500;
  transition: color .2s, background .2s;
}
.tab-btn.active { background: var(--blue-tint); color: var(--navy); }
.tab-btn svg { width: 20px; height: 20px; }

/* ════════════════════════════════════════════════════════════════
   LAYOUT HELPERS
════════════════════════════════════════════════════════════════ */
.stack    { display: flex; flex-direction: column; gap: 12px; }
.stack-s  { display: flex; flex-direction: column; gap: 8px; }
.row      { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.row-s    { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.grid2    { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.hidden   { display: none !important; }

/* ════════════════════════════════════════════════════════════════
   CARDS
════════════════════════════════════════════════════════════════ */
.card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--r24);
  padding: 16px;
  box-shadow: var(--sh2);
}
.card-s  { padding: 13px; }
.card-xs { padding: 10px 13px; }

/* Hero card — navy gradient */
.card-hero {
  background: linear-gradient(145deg, var(--navy) 0%, var(--navy-mid) 55%, var(--navy-light) 100%);
  border: none;
  color: #fff;
  position: relative;
  overflow: hidden;
}
.card-hero::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 90% 10%, rgba(199,164,106,.18) 0%, transparent 55%),
    radial-gradient(ellipse at 5% 90%,  rgba(255,255,255,.05) 0%, transparent 40%);
  pointer-events: none;
}
.hero-content { position: relative; z-index: 1; }

/* Alert card */
.card-warn   { background: linear-gradient(135deg,#FFFBEB,#FEF9EC); border-color: #FDE68A; }
.card-danger { background: #FFF5F5; border-color: #FECACA; }
.card-green  { background: var(--green-bg); border-color: rgba(22,163,74,.3); }
.card-surface{ background: var(--surface); }

/* Metric mini card */
.metric-card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--r20);
  padding: 14px;
  box-shadow: var(--sh1);
}

/* ════════════════════════════════════════════════════════════════
   TYPOGRAPHY HELPERS
════════════════════════════════════════════════════════════════ */
.t-hero   { font-family: var(--font-d); font-size: 26px; font-weight: 300; letter-spacing: -.02em; color: var(--text-1); line-height: 1.15; }
.t-h2     { font-family: var(--font-d); font-size: 20px; font-weight: 300; letter-spacing: -.01em; color: var(--text-1); }
.t-h3     { font-size: 17px; font-weight: 700; color: var(--text-1); }
.t-h4     { font-size: 15px; font-weight: 700; color: var(--text-1); }
.t-label  { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text-4); }
.t-body   { font-size: 14px; color: var(--text-2); line-height: 1.55; }
.t-small  { font-size: 13px; color: var(--text-3); }
.t-tiny   { font-size: 11.5px; color: var(--text-4); }
.t-num    { font-family: var(--font-d); font-size: 26px; font-weight: 300; letter-spacing: -.02em; color: var(--text-1); }
.t-num-lg { font-family: var(--font-d); font-size: 34px; font-weight: 300; letter-spacing: -.02em; }

/* ════════════════════════════════════════════════════════════════
   BADGES
════════════════════════════════════════════════════════════════ */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 999px; font-size: 11.5px; font-weight: 700; }
.badge-high   { background: var(--danger-bg); color: var(--danger); }
.badge-medium { background: var(--warn-bg);   color: #92400E; }
.badge-low    { background: var(--green-bg);  color: var(--green); }
.badge-navy   { background: rgba(11,31,58,.07); color: var(--navy); }
.badge-blue   { background: var(--blue-tint); color: var(--navy-mid); }
.badge-gold   { background: rgba(199,164,106,.12); border: 1px solid rgba(199,164,106,.25); color: var(--gold); }

/* ════════════════════════════════════════════════════════════════
   LIST ITEMS
════════════════════════════════════════════════════════════════ */
.list-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  min-height: var(--touch);
  background: var(--surface);
  border-radius: var(--r16);
  border: 1px solid transparent;
  cursor: pointer;
  transition: background .12s;
  -webkit-tap-highlight-color: transparent;
}
.list-item:active { background: var(--line); }
.item-icon {
  width: 40px; height: 40px;
  border-radius: 13px;
  display: flex; align-items: center; justify-content: center;
  font-size: 19px;
  flex-shrink: 0;
}
.ic-blue  { background: var(--blue-tint); }
.ic-gold  { background: rgba(199,164,106,.12); }
.ic-green { background: var(--green-bg); }
.ic-warn  { background: var(--warn-bg); }
.ic-navy  { background: rgba(11,31,58,.06); }
.chevron  { font-size: 20px; color: var(--text-4); flex-shrink: 0; }

/* ════════════════════════════════════════════════════════════════
   BUTTONS
════════════════════════════════════════════════════════════════ */
.btn-primary {
  width: 100%; padding: 15px;
  min-height: var(--touch);
  border-radius: var(--r16);
  background: linear-gradient(135deg, var(--navy), var(--navy-mid));
  color: #fff; font-weight: 700; font-size: 15px;
  box-shadow: 0 3px 12px rgba(11,31,58,.22);
  transition: opacity .12s, transform .1s;
  -webkit-tap-highlight-color: transparent;
}
.btn-primary:active { opacity: .9; transform: scale(.99); }

.btn-secondary {
  width: 100%; padding: 14px;
  min-height: var(--touch);
  border-radius: var(--r16);
  background: var(--card);
  color: var(--text-2); font-weight: 600; font-size: 14px;
  border: 1.5px solid var(--line);
  transition: background .12s;
}
.btn-secondary:active { background: var(--surface); }

.btn-ghost { padding: 8px 12px; border-radius: 999px; font-size: 13px; font-weight: 700; color: var(--gold); }
.btn-2col  { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* ════════════════════════════════════════════════════════════════
   PROGRESS BAR
════════════════════════════════════════════════════════════════ */
.progress { height: 7px; background: var(--surface); border-radius: 999px; overflow: hidden; border: 1px solid var(--line); }
.progress-fill { height: 100%; border-radius: 999px; transition: width .6s ease; }

/* ════════════════════════════════════════════════════════════════
   KV GRID
════════════════════════════════════════════════════════════════ */
.kv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
.kv-card { background: var(--surface); border-radius: var(--r16); padding: 12px; border: 1px solid var(--line); }
.kv-label { font-size: 11px; color: var(--text-3); font-weight: 500; margin-bottom: 5px; }
.kv-value { font-size: 15px; font-weight: 700; color: var(--text-1); }

/* ════════════════════════════════════════════════════════════════
   TIMELINE
════════════════════════════════════════════════════════════════ */
.tl { display: flex; flex-direction: column; }
.tl-item { display: flex; gap: 13px; padding-bottom: 16px; }
.tl-item:last-child { padding-bottom: 0; }
.tl-spine { display: flex; flex-direction: column; align-items: center; width: 22px; flex-shrink: 0; }
.tl-dot { width: 11px; height: 11px; border-radius: 999px; border: 2px solid var(--navy); background: var(--card); flex-shrink: 0; margin-top: 3px; }
.tl-dot.filled { background: var(--navy); }
.tl-dot.gold   { border-color: var(--gold); background: var(--gold); }
.tl-line { width: 2px; flex: 1; background: var(--line); margin: 4px 0 0; }
.tl-item:last-child .tl-line { display: none; }
.tl-body { flex: 1; padding-top: 1px; }

/* ════════════════════════════════════════════════════════════════
   BAR CHART
════════════════════════════════════════════════════════════════ */
.bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 90px; }
.bar-col   { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.bar-fill  { width: 100%; border-radius: 6px 6px 0 0; }
.bar-navy  { background: linear-gradient(180deg, #3a6cc8, #1a3a6b); }
.bar-gold  { background: linear-gradient(180deg, var(--gold-light), var(--gold)); }
.bar-lbl   { font-size: 9px; color: var(--text-4); font-weight: 600; }

/* ════════════════════════════════════════════════════════════════
   SPARKLINE HELPER
════════════════════════════════════════════════════════════════ */
.sparkline { overflow: visible; }

/* ════════════════════════════════════════════════════════════════
   AVATAR
════════════════════════════════════════════════════════════════ */
.avatar {
  border-radius: 999px;
  background: linear-gradient(135deg, var(--navy-mid), var(--navy-light));
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 700;
  font-family: var(--font-d);
  flex-shrink: 0;
}
.av-sm { width: 34px; height: 34px; font-size: 13px; }
.av-md { width: 44px; height: 44px; font-size: 17px; }
.av-lg { width: 64px; height: 64px; font-size: 26px; }

/* ════════════════════════════════════════════════════════════════
   STATUS DOT
════════════════════════════════════════════════════════════════ */
.dot { width: 8px; height: 8px; border-radius: 999px; flex-shrink: 0; }
.dot-green { background: var(--green); }
.dot-warn  { background: var(--warn); }
.dot-red   { background: var(--danger); }
.dot-grey  { background: var(--text-4); }

/* ════════════════════════════════════════════════════════════════
   TOGGLE SWITCH
════════════════════════════════════════════════════════════════ */
.toggle { width: 44px; height: 26px; border-radius: 999px; background: var(--green); position: relative; flex-shrink: 0; cursor: pointer; transition: background .2s; }
.toggle.off { background: var(--line-2); }
.toggle::after { content: ''; position: absolute; top: 3px; left: 3px; width: 20px; height: 20px; border-radius: 999px; background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,.2); transition: left .2s; }
.toggle:not(.off)::after { left: 21px; }

/* ════════════════════════════════════════════════════════════════
   SECTION HEADING
════════════════════════════════════════════════════════════════ */
.section-head { display: flex; align-items: center; justify-content: space-between; padding: 0 2px; margin-bottom: -4px; }

/* ════════════════════════════════════════════════════════════════
   CALENDAR
════════════════════════════════════════════════════════════════ */
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; text-align: center; }
.cal-hdr  { font-size: 11px; font-weight: 700; color: var(--text-4); text-transform: uppercase; height: 24px; display: flex; align-items: center; justify-content: center; letter-spacing: .04em; }
.cal-day  { height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; color: var(--text-2); position: relative; cursor: pointer; }
.cal-day.today { background: var(--navy); color: #fff; font-weight: 700; }
.cal-day.has-event::after { content: ''; position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; border-radius: 999px; background: var(--gold); }
.cal-day.today.has-event::after { background: var(--gold-light); }

/* ════════════════════════════════════════════════════════════════
   MODAL / BOTTOM SHEET
════════════════════════════════════════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.5);
  backdrop-filter: blur(6px);
  display: flex; align-items: flex-end; justify-content: center;
  animation: fadeIn .18s ease;
}
.modal-overlay.hidden { display: none; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal-sheet {
  background: var(--card);
  border-radius: var(--r32) var(--r32) 0 0;
  width: min(430px, 100vw);
  padding: 24px 20px calc(24px + var(--sab));
  animation: sheetUp .25s cubic-bezier(.34,1.56,.64,1);
  max-height: 90dvh;
  overflow-y: auto;
}
@keyframes sheetUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.sheet-handle { width: 36px; height: 4px; background: var(--line-2); border-radius: 999px; margin: 0 auto 20px; }

/* ════════════════════════════════════════════════════════════════
   TOAST
════════════════════════════════════════════════════════════════ */
.toast {
  position: fixed; z-index: 300;
  /* Position below topbar — JS will calculate exact top */
  top: 80px; left: 50%;
  transform: translateX(-50%);
  width: calc(min(430px,100vw) - 28px);
  background: var(--navy); color: #fff;
  border-radius: var(--r16);
  padding: 12px 16px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: var(--sh3);
  animation: toastIn .25s cubic-bezier(.34,1.56,.64,1);
  pointer-events: none;
}
.toast.hidden { display: none; }
@keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(-12px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

/* ════════════════════════════════════════════════════════════════
   ICON PICKER
════════════════════════════════════════════════════════════════ */
.icon-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; }
.icon-opt  { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
.icon-opt span { font-size: 11px; color: var(--text-3); font-weight: 600; }
.icon-opt svg  { border-radius: 20px; box-shadow: var(--sh2); transition: transform .15s; }
.icon-opt:active svg { transform: scale(.94); }
.icon-opt.selected svg { outline: 3px solid var(--navy); outline-offset: 3px; }

/* ════════════════════════════════════════════════════════════════
   DIVIDER
════════════════════════════════════════════════════════════════ */
.divider { height: 1px; background: var(--line); margin: 12px 0; }

/* ════════════════════════════════════════════════════════════════
   ACCESSIBILITY
════════════════════════════════════════════════════════════════ */
:focus-visible { outline: 3px solid var(--gold); outline-offset: 2px; border-radius: 4px; }
:focus:not(:focus-visible) { outline: none; }
.skip-link { position: absolute; top: -100px; left: 16px; background: var(--navy); color: #fff; padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 700; z-index: 9999; transition: top .2s; }
.skip-link:focus { top: 8px; }

/* ════════════════════════════════════════════════════════════════
   ANIMATIONS
════════════════════════════════════════════════════════════════ */
@keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
.anim > * { animation: fadeUp .28s ease both; }
.anim > *:nth-child(1){animation-delay:.03s}
.anim > *:nth-child(2){animation-delay:.07s}
.anim > *:nth-child(3){animation-delay:.11s}
.anim > *:nth-child(4){animation-delay:.15s}
.anim > *:nth-child(5){animation-delay:.19s}
.anim > *:nth-child(6){animation-delay:.23s}
.anim > *:nth-child(7){animation-delay:.27s}

/* Step list */
.step-list { display: flex; flex-direction: column; gap: 10px; }
.step-item { display: flex; gap: 12px; align-items: flex-start; }
.step-num  { width: 28px; height: 28px; border-radius: 999px; display: flex; align-items: center; justify-content: center; background: var(--navy); color: #fff; font-size: 12px; font-weight: 700; flex-shrink: 0; box-shadow: 0 2px 6px rgba(11,31,58,.18); }
.step-num.gold { background: linear-gradient(135deg,var(--gold-light),var(--gold)); color: var(--navy); }

/* Search */
.search-bar { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r16); padding: 10px 14px; }
.search-bar input { border: none; background: none; font: inherit; font-size: 14px; color: var(--text-1); flex: 1; outline: none; }
.search-bar input::placeholder { color: var(--text-4); }

/* Ring */

<script>
'use strict';
/* ════════════════════════════════════════════════════════════════
   SAFE AREA — THE DEFINITIVE FIX
   
   How it works:
   1. On every paint, we measure the ACTUAL rendered height of
      #topbar and #tabbar using getBoundingClientRect().
   2. We set #app's padding using env(safe-area-inset-*) which
      works correctly in BOTH browser and PWA mode when
      viewport-fit=cover is set.
   3. As a belt-and-suspenders fallback, if env() returns 0
      we use hardcoded values based on screen dimensions.
   4. The scroll bounce is prevented by blocking touchmove
      at the document level except inside #scroller.
════════════════════════════════════════════════════════════════ */

// Disable Safari scroll restoration
if ('scrollRestoration' in history) history.scrollRestoration = 'manual';

function initLayout() {
  var app = document.getElementById('app');
  if (!app) return;

  // Measure actual safe area values
  var probe = document.createElement('div');
  probe.style.cssText = [
    'position:fixed', 'top:0', 'left:0', 'width:0', 'height:0',
    'padding-top:env(safe-area-inset-top,0px)',
    'padding-bottom:env(safe-area-inset-bottom,0px)',
    'visibility:hidden', 'pointer-events:none'
  ].join(';');
  document.body.appendChild(probe);
  var cs = getComputedStyle(probe);
  var safeTop    = parseInt(cs.paddingTop,    10) || 0;
  var safeBottom = parseInt(cs.paddingBottom, 10) || 0;
  document.body.removeChild(probe);

  // Fallback: if env() returns 0 AND we're on an actual iOS device,
  // use screen-size-based values matching Apple's published specs.
  // On desktop/non-iOS, safe area stays 0 so the layout isn't distorted.
  var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
              (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  if (isIOS && safeTop === 0) {
    var sw = window.screen.width;
    var sh = window.screen.height;
    if (sh >= 932) safeTop = 59;
    else if (sh >= 852) safeTop = 59;
    else if (sh >= 844) safeTop = 47;
    else safeTop = 44;
  }
  if (isIOS && safeBottom === 0) safeBottom = 34;

  // Apply safe area padding only on iOS — on desktop/Chrome, env() in CSS handles it
  if (isIOS) {
    app.style.paddingTop    = safeTop    + 'px';
    app.style.paddingBottom = safeBottom + 'px';
  }

  // Update toast position to sit just below topbar
  var topbar = document.getElementById('topbar');
  if (topbar) {
    setTimeout(function() {
      var tbh = topbar.getBoundingClientRect().height;
      var toast = document.getElementById('toast');
      if (toast) toast.style.top = (tbh + 8) + 'px';
    }, 100);
  }
}

// Prevent document-level bounce scroll (iOS Safari only)
// Only apply on iOS where overscroll-behavior isn't fully supported
var _isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
             (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

if (_isIOS) {
  var _touchStartY = 0;
  document.addEventListener('touchstart', function(e) {
    _touchStartY = e.touches[0].clientY;
  }, { passive: true });

  document.addEventListener('touchmove', function(e) {
    var el = e.target;
    while (el && el !== document.documentElement) {
      if (el.id === 'scroller') {
        var atTop    = el.scrollTop <= 0;
        var atBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 1;
        var goingDown = e.touches[0].clientY > _touchStartY;
        var goingUp   = e.touches[0].clientY < _touchStartY;
        if (atTop && goingDown) { e.preventDefault(); return; }
        if (atBottom && goingUp) { e.preventDefault(); return; }
        return;
      }
      if (el.classList && el.classList.contains('modal-sheet')) return;
      if (el.id === 'plat-bar') return;
      el = el.parentElement;
    }
    e.preventDefault();
  }, { passive: false });
}

// ════════════════════════════════════════════════════════════════
// ELEMENT HELPERS
// ════════════════════════════════════════════════════════════════
function el(tag, cls, html) {
  var n = document.createElement(tag);
  if (cls) n.className = cls;
  if (html) n.innerHTML = html;
  return n;
}
function div(cls, html) { return el('div', cls, html); }
function btn(cls, html, fn) {
  var b = el('button', cls, html);
  if (fn) b.addEventListener('click', fn);
  return b;
}
function card(cls, html) { return div('card ' + (cls||''), html); }

function sparkline(data, color) {
  var w=80, h=36, p=3;
  var mn=Math.min.apply(null,data), mx=Math.max.apply(null,data), rng=mx-mn||1;
  var pts=data.map(function(v,i){
    return ((p+(i/(data.length-1))*(w-2*p)).toFixed(1))+','+
           ((h-p-(((v-mn)/rng)*(h-2*p))).toFixed(1));
  }).join(' ');
  var last=pts.split(' ').pop().split(',');
  return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" class="sparkline">'+
    '<polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity=".8"/>'+
    '<circle cx="'+last[0]+'" cy="'+last[1]+'" r="3" fill="'+color+'"/>'+
    '</svg>';
}

function trendIcon(t) {
  if (t==='up')   return '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2.5" stroke-linecap="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>';
  if (t==='down') return '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--warn)" stroke-width="2.5" stroke-linecap="round"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>';
  return '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>';
}

function healthRing(score) {
  var r=30, c=2*Math.PI*r, d=(score/100)*c;
  var col = score>=80 ? '#4ade80' : score>=60 ? 'var(--gold-light)' : '#f87171';
  return '<svg width="80" height="80" viewBox="0 0 80 80">'+
    '<circle cx="40" cy="40" r="'+r+'" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="5"/>'+
    '<circle cx="40" cy="40" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="5" stroke-dasharray="'+d+' '+c+'" stroke-dashoffset="'+(c*.25)+'" stroke-linecap="round" transform="rotate(-90 40 40)" opacity=".9"/>'+
    '</svg>';
}

// ROUTING
// ════════════════════════════════════════════════════════════════
function navigate(id, params) { S.stack.push({id:id, params:params||{}}); render(); }
function goBack()             { if (S.stack.length) { S.stack.pop(); render(); } }
function switchTab(tab)       { S.tab=tab; S.stack=[]; S.platform='patient'; render(); }
function switchPlatform(plat) { S.platform=plat; S.stack=[]; render(); }

function currentScreen() {
  return S.stack.length ? S.stack[S.stack.length-1] : {id:S.tab, params:{}};
}

var SCREEN_TITLES = {
  home:'Home', care:'Care', monitor:'Monitor', records:'Records', more:'More',
  'alert-detail':'Alert Detail', 'medication-detail':'Medication', 'metric-detail':'Metric Detail',
  'record-detail':'Record', 'care-plan':'Care Plan', escalation:'Escalation Flow',
  settings:'Settings', profile:'My Profile', calendar:'Calendar', devices:'Connected Devices',
  'care-team':'Care Team', 'disease-programs':'Condition Programs', support:'Support',
  notifications:'Notifications', clinician:'Clinician', employer:'Employer'
};

function render() {
  var cur = currentScreen();
  var title = S.platform==='clinician' ? 'Clinician' : S.platform==='employer' ? 'Employer' : (SCREEN_TITLES[cur.id] || 'Home');
  document.getElementById('screenTitle').textContent = title;

  var showBack = S.stack.length > 0;
  document.getElementById('btnBack').classList.toggle('hidden', !showBack);
  document.getElementById('brandMark').classList.toggle('hidden', showBack);

  // Tab bar active state
  document.querySelectorAll('#tabbar .tab-btn').forEach(function(b) {
    var active = b.dataset.tab === S.tab && S.stack.length === 0 && S.platform === 'patient';
    b.classList.toggle('active', active);
    b.setAttribute('aria-selected', String(active));
  });

  // Platform bar
  document.querySelectorAll('#plat-bar .plat-btn').forEach(function(b) {
    var active = b.dataset.plat === S.platform;
    b.classList.toggle('active', active);
    b.setAttribute('aria-selected', String(active));
  });
  document.getElementById('plat-bar').classList.toggle('hidden', S.stack.length > 0);

  // Render screen
  var scroller = document.getElementById('scroller');
  scroller.innerHTML = '';
  scroller.scrollTop = 0;

  var wrap = div('screen-pad');
  var content = div('stack anim');

  if      (S.platform==='clinician')           renderClinician(content);
  else if (S.platform==='employer')            renderEmployer(content);
  else if (cur.id==='home')                    renderHome(content);
  else if (cur.id==='care')                    renderCare(content);
  else if (cur.id==='monitor')                 renderMonitor(content);
  else if (cur.id==='records')                 renderRecords(content);
  else if (cur.id==='more')                    renderMore(content);
  else if (cur.id==='alert-detail')            renderAlertDetail(content, cur.params);
  else if (cur.id==='medication-detail')       renderMedicationDetail(content, cur.params);
  else if (cur.id==='metric-detail')           renderMetricDetail(content, cur.params);
  else if (cur.id==='record-detail')           renderRecordDetail(content, cur.params);
  else if (cur.id==='care-plan')               renderCarePlan(content);
  else if (cur.id==='escalation')              renderEscalation(content);
  else if (cur.id==='profile')                 renderProfile(content);
  else if (cur.id==='calendar')                renderCalendar(content);
  else if (cur.id==='devices')                 renderDevices(content);
  else if (cur.id==='care-team')               renderCareTeam(content);
  else if (cur.id==='disease-programs')        renderDiseasePrograms(content);
  else if (cur.id==='notifications')           renderNotifications(content);
  else if (cur.id==='settings')                renderSettings(content);
  else if (cur.id==='support')                 renderSupport(content);
  else renderHome(content);

  wrap.appendChild(content);
  scroller.appendChild(wrap);

  // Re-init layout in case topbar height changed
  initLayout();
}

var _toastTimer;
function showToast(title, body) {
  var t = document.getElementById('toast');
  document.getElementById('toastTitle').textContent = title;
  document.getElementById('toastBody').textContent = body || '';
  t.classList.remove('hidden');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function() { t.classList.add('hidden'); }, 3000);
}

(function() {
  var root = document.documentElement;
  var btn  = document.getElementById('btnTheme');
  var icon = document.getElementById('themeIcon');
  var SUN  = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
  var MOON = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';

  function isDark() { return root.dataset.theme==='dark' || (!root.dataset.theme && matchMedia('(prefers-color-scheme:dark)').matches); }
  function applyTheme(dark) {
    root.dataset.theme = dark ? 'dark' : 'light';
    icon.innerHTML = dark ? SUN : MOON;
    btn.setAttribute('aria-label', dark ? 'Switch to light mode' : 'Switch to dark mode');
    btn.setAttribute('aria-pressed', String(dark));
  }
  applyTheme(isDark());
  btn.addEventListener('click', function() { applyTheme(!isDark()); });
  matchMedia('(prefers-color-scheme:dark)').addEventListener('change', function(e) { if (!root.dataset.theme) applyTheme(e.matches); });
})();

function makeSVGIcon(type) {
  var ns='http://www.w3.org/2000/svg', s=document.createElementNS(ns,'svg');
  s.setAttribute('width','78'); s.setAttribute('height','78'); s.setAttribute('viewBox','0 0 78 78');
  var defs=document.createElementNS(ns,'defs'), grad=document.createElementNS(ns,'linearGradient');
  grad.setAttribute('id','ig_'+type); grad.setAttribute('x1','0'); grad.setAttribute('y1','0'); grad.setAttribute('x2','1'); grad.setAttribute('y2','1');
  var stops=type==='vitality'?[['0%','#C7A46A'],['100%','#9a7540']]:[['0%','#0B1F3A'],['100%','#1a3d7a']];
  stops.forEach(function(st){ var n=document.createElementNS(ns,'stop'); n.setAttribute('offset',st[0]); n.setAttribute('stop-color',st[1]); grad.appendChild(n); });
  defs.appendChild(grad); s.appendChild(defs);
  var rect=document.createElementNS(ns,'rect'); rect.setAttribute('width','78'); rect.setAttribute('height','78'); rect.setAttribute('rx','19'); rect.setAttribute('fill','url(#ig_'+type+')'); s.appendChild(rect);
  var g='#C7A46A', gl='#e8c488';
  if(type==='pulse'){
    var pl=document.createElementNS(ns,'polyline'); pl.setAttribute('points','12,39 20,39 26,27 33,51 39,31 45,45 51,39 66,39'); pl.setAttribute('fill','none'); pl.setAttribute('stroke',g); pl.setAttribute('stroke-width','2.8'); pl.setAttribute('stroke-linecap','round'); pl.setAttribute('stroke-linejoin','round'); s.appendChild(pl);
    var ck=document.createElementNS(ns,'circle'); ck.setAttribute('cx','39'); ck.setAttribute('cy','58'); ck.setAttribute('r','7.5'); ck.setAttribute('fill','rgba(199,164,106,.15)'); ck.setAttribute('stroke',g); ck.setAttribute('stroke-width','1.5'); s.appendChild(ck);
    var ch=document.createElementNS(ns,'polyline'); ch.setAttribute('points','35.5,58 38,60.5 43,55'); ch.setAttribute('fill','none'); ch.setAttribute('stroke',g); ch.setAttribute('stroke-width','1.8'); ch.setAttribute('stroke-linecap','round'); ch.setAttribute('stroke-linejoin','round'); s.appendChild(ch);
  } else if(type==='shield'){
    var sh=document.createElementNS(ns,'path'); sh.setAttribute('d','M39 14 L55 23 L55 41 C55 52 39 60 39 60 C39 60 23 52 23 41 L23 23 Z'); sh.setAttribute('fill','rgba(199,164,106,.18)'); sh.setAttribute('stroke',g); sh.setAttribute('stroke-width','1.8'); s.appendChild(sh);
    var chk=document.createElementNS(ns,'polyline'); chk.setAttribute('points','31,38 37,44 48,31'); chk.setAttribute('fill','none'); chk.setAttribute('stroke',gl); chk.setAttribute('stroke-width','2.8'); chk.setAttribute('stroke-linecap','round'); chk.setAttribute('stroke-linejoin','round'); s.appendChild(chk);
  } else if(type==='vitality'){
    var ring=document.createElementNS(ns,'circle'); ring.setAttribute('cx','39'); ring.setAttribute('cy','34'); ring.setAttribute('r','14'); ring.setAttribute('fill','rgba(255,255,255,.15)'); ring.setAttribute('stroke','rgba(255,255,255,.7)'); ring.setAttribute('stroke-width','1.8'); s.appendChild(ring);
    var drop=document.createElementNS(ns,'path'); drop.setAttribute('d','M39 22 C39 22 45 30 45 35 C45 38.3 42.3 41 39 41 C35.7 41 33 38.3 33 35 C33 30 39 22 39 22Z'); drop.setAttribute('fill','rgba(255,255,255,.9)'); s.appendChild(drop);
  } else if(type==='classic'){
    var vb=document.createElementNS(ns,'rect'); vb.setAttribute('x','35'); vb.setAttribute('y','20'); vb.setAttribute('width','8'); vb.setAttribute('height','38'); vb.setAttribute('rx','4'); vb.setAttribute('fill',g); s.appendChild(vb);
    var hb=document.createElementNS(ns,'rect'); hb.setAttribute('x','20'); hb.setAttribute('y','35'); hb.setAttribute('width','38'); hb.setAttribute('height','8'); hb.setAttribute('rx','4'); hb.setAttribute('fill',g); s.appendChild(hb);
  } else if(type==='orbit'){
    [20,12].forEach(function(r){ var ring=document.createElementNS(ns,'circle'); ring.setAttribute('cx','39'); ring.setAttribute('cy','39'); ring.setAttribute('r',String(r)); ring.setAttribute('fill','none'); ring.setAttribute('stroke','rgba(199,164,106,.22)'); ring.setAttribute('stroke-width','1.2'); s.appendChild(ring); });
    var core=document.createElementNS(ns,'circle'); core.setAttribute('cx','39'); core.setAttribute('cy','39'); core.setAttribute('r','5.5'); core.setAttribute('fill',g); s.appendChild(core);
    [[59,39,3.5],[39,19,2.5],[21,49,2]].forEach(function(c,i){ var sat=document.createElementNS(ns,'circle'); sat.setAttribute('cx',String(c[0])); sat.setAttribute('cy',String(c[1])); sat.setAttribute('r',String(c[2])); sat.setAttribute('fill','rgba(199,164,106,'+(1-i*.28)+')'); s.appendChild(sat); });
  } else {
    [[14,35,8,.5],[22,28,20,.65],[30,22,32,.8],[38,18,42,1],[46,24,30,.8],[54,30,18,.62],[62,35,8,.42]].forEach(function(b){ var bar=document.createElementNS(ns,'rect'); bar.setAttribute('x',String(b[0])); bar.setAttribute('y',String(b[1])); bar.setAttribute('width','5'); bar.setAttribute('height',String(b[2])); bar.setAttribute('rx','2.5'); bar.setAttribute('fill',g); bar.setAttribute('opacity',String(b[3])); s.appendChild(bar); });
  }
  return s;
}

var ICON_TYPES = ['pulse','shield','vitality','classic','orbit','signal'];
var ICON_NAMES = ['Pulse','Shield','Vitality','Classic','Orbit','Signal'];

function initIconPicker() {
  var grid = document.getElementById('iconGrid');
  ICON_TYPES.forEach(function(type, i) {
    var opt = div('icon-opt '+(i===0?'selected':''));
    opt.dataset.id = String(i);
    opt.appendChild(makeSVGIcon(type));
    var lbl = document.createElement('span');
    lbl.textContent = ICON_NAMES[i];
    opt.appendChild(lbl);
    opt.addEventListener('click', function() {
      grid.querySelectorAll('.icon-opt').forEach(function(o){ o.classList.remove('selected'); });
      opt.classList.add('selected');
      S.selectedIcon = opt.dataset.id;
      // Update brand mark
      var bm = document.getElementById('brandMark');
      bm.innerHTML = '';
      bm.style.cssText = 'flex-shrink:0;width:34px;height:34px;border-radius:10px;overflow:hidden';
      var ic = makeSVGIcon(type);
      ic.style.cssText = 'width:34px;height:34px;border-radius:10px';
      bm.appendChild(ic);
    });
    grid.appendChild(opt);
  });

  document.getElementById('btnIconPicker').addEventListener('click', function() {
    document.getElementById('iconModal').classList.remove('hidden');
  });
  document.getElementById('iconDone').addEventListener('click', function() {
    document.getElementById('iconModal').classList.add('hidden');
    showToast('Icon updated','App icon saved.');
  });
  document.getElementById('iconModal').addEventListener('click', function(e) {
    if (e.target === this) this.classList.add('hidden');
  });
}
